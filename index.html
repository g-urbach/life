    // NEW PRINT PREVIEW FUNCTIONS (v1.88)
    function printBook() {
      if (!currentUser) return toast('Please sign in first');
      if (!currentStory) return toast('Please generate a story first');
      showPrintPreview();
    }

    function showPrintPreview() {
      const modal = document.getElementById('printPreviewModal');
      const name = userProfile.name || 'You';

      document.getElementById('previewTitle').textContent = currentStory.funny 
        ? `${name}'s Life Story (The Funny Edition)` 
        : `${name}'s Life Story`;
      document.getElementById('previewAuthor').textContent = `by ${name}`;

      const interiorHTML = document.getElementById('storyOutput').innerHTML || '';
      document.getElementById('previewInterior').innerHTML = `
        <div style="font-size:0.85rem;color:#8b7355;margin-bottom:12px">PAGE 3 • INTERIOR</div>
        ${interiorHTML.substring(0, 620)}…
        <div style="margin-top:30px;font-size:0.75rem;color:#c9a96e;text-align:center">… and more</div>
      `;

      const defaultBlurb = currentStory.funny 
        ? `A warm, witty roast of ${name}'s life — the good, the bad, and the slightly embarrassing.` 
        : `The story of ${name} — a life filled with love, laughter, lessons, and the people who made every chapter worth remembering.`;
      document.getElementById('previewBlurb').value = defaultBlurb;

      const estPages = Math.max(20, Math.ceil((currentStory.wordCount || 800) / 1800));
      document.getElementById('previewPageCount').textContent = `${estPages} pages`;
      document.getElementById('previewPadNote').innerHTML = estPages > 20 ? '' : '✅ We will automatically pad to Peecho’s 20-page minimum';

      modal.classList.add('open');
    }

    function closePrintPreview() {
      document.getElementById('printPreviewModal').classList.remove('open');
