<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🚀 Life Story — Deploy</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --gold: #f5c842;
    --gold-dim: #a38420;
    --green: #3dffa0;
    --red: #ff4d6d;
    --amber: #ffb347;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --mono: 'Space Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  body {
    background: var(--bg); color: var(--text);
    font-family: var(--mono); min-height: 100vh;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 24px; overflow-x: hidden;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(245,200,66,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,200,66,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none;
  }

  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 48px 40px;
    width: 100%; max-width: 620px; position: relative;
    box-shadow: 0 0 80px rgba(245,200,66,0.04), 0 24px 60px rgba(0,0,0,0.6);
    margin: 24px 0;
  }

  .panel::before {
    content: ''; position: absolute; top: 0; left: 40px; right: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }

  .logo { font-family: var(--display); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
  h1 { font-family: var(--display); font-size: 2rem; font-weight: 800; color: var(--text); line-height: 1.1; margin-bottom: 32px; }
  h1 span { color: var(--gold); }
  h2 { font-family: var(--display); font-size: 1rem; font-weight: 700; color: var(--gold); margin: 28px 0 16px; letter-spacing: 0.1em; text-transform: uppercase; }

  .field { margin-bottom: 16px; }

  label {
    display: block; font-size: 0.65rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }

  input[type="password"], input[type="text"] {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; color: var(--text);
    font-family: var(--mono); font-size: 0.8rem; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: var(--gold-dim); }

  .file-drop {
    border: 2px dashed var(--border); border-radius: 10px; padding: 28px;
    text-align: center; cursor: pointer; transition: all 0.2s;
    background: var(--bg); position: relative; margin-bottom: 16px;
  }
  .file-drop:hover, .file-drop.dragover { border-color: var(--gold-dim); background: rgba(245,200,66,0.03); }
  .file-drop input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .file-drop .drop-icon { font-size: 1.8rem; margin-bottom: 8px; display: block; }
  .file-drop .drop-text { font-size: 0.78rem; color: var(--muted); }
  .file-drop .drop-name { font-size: 0.82rem; color: var(--gold); margin-top: 6px; }

  .deploy-btn {
    width: 100%; padding: 18px; background: var(--gold); color: #0a0a0f;
    border: none; border-radius: 10px; font-family: var(--display);
    font-size: 1rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; margin-top: 8px;
  }
  .deploy-btn:hover:not(:disabled) { background: #ffd84a; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(245,200,66,0.3); }
  .deploy-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .deploy-btn.deploying { background: var(--gold-dim); color: #0a0a0f; }
  .deploy-btn.deploying::after {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 1.2s infinite;
  }
  @keyframes shimmer { to { left: 100%; } }

  .log {
    margin-top: 24px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; font-size: 0.72rem; line-height: 1.8;
    max-height: 240px; overflow-y: auto; display: none;
  }
  .log.visible { display: block; }
  .log-line { display: flex; gap: 10px; }
  .log-line .ts { color: var(--muted); flex-shrink: 0; }
  .log-line .msg { color: var(--text); word-break: break-all; }
  .log-line.success .msg { color: var(--green); }
  .log-line.error   .msg { color: var(--red); }
  .log-line.warn    .msg { color: var(--amber); }
  .log-line.info    .msg { color: var(--gold); }

  .status-bar {
    display: none; align-items: center; gap: 10px; margin-top: 20px;
    padding: 12px 16px; border-radius: 8px; font-size: 0.75rem;
  }
  .status-bar.visible { display: flex; }
  .status-bar.success { background: rgba(61,255,160,0.08); border: 1px solid rgba(61,255,160,0.2); color: var(--green); }
  .status-bar.error   { background: rgba(255,77,109,0.08); border: 1px solid rgba(255,77,109,0.2); color: var(--red); }
  .status-bar.warn    { background: rgba(255,179,71,0.08); border: 1px solid rgba(255,179,71,0.2); color: var(--amber); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .success .status-dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .error   .status-dot { background: var(--red);   box-shadow: 0 0 8px var(--red); }
  .warn    .status-dot { background: var(--amber);  box-shadow: 0 0 8px var(--amber); }

  /* Test results */
  .test-results {
    display: none; margin-top: 24px; border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .test-results.visible { display: block; }
  .test-header {
    padding: 12px 16px; font-size: 0.75rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; display: flex;
    justify-content: space-between; align-items: center;
  }
  .test-header.all-pass { background: rgba(61,255,160,0.1); color: var(--green); }
  .test-header.has-fail { background: rgba(255,77,109,0.1); color: var(--red); }
  .test-header.has-warn { background: rgba(255,179,71,0.1); color: var(--amber); }
  .test-list { padding: 8px 0; max-height: 320px; overflow-y: auto; }
  .test-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 6px 16px; font-size: 0.7rem; line-height: 1.5;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .test-item:last-child { border-bottom: none; }
  .test-icon { flex-shrink: 0; width: 14px; }
  .test-name { color: var(--text); flex: 1; }
  .test-detail { color: var(--muted); font-size: 0.65rem; margin-top: 2px; }
  .test-item.pass .test-icon { color: var(--green); }
  .test-item.fail .test-icon { color: var(--red); }
  .test-item.warn .test-icon { color: var(--amber); }

  /* Copy button for failed tests */
  .copy-failures-btn {
    display: none; width: 100%; padding: 10px; background: rgba(255,77,109,0.1);
    border: 1px solid rgba(255,77,109,0.3); border-radius: 0 0 10px 10px;
    color: var(--red); font-family: var(--mono); font-size: 0.72rem;
    cursor: pointer; letter-spacing: 0.05em; transition: background 0.2s;
  }
  .copy-failures-btn:hover { background: rgba(255,77,109,0.2); }
  .copy-failures-btn.visible { display: block; }

  .tip {
    margin-top: 24px; font-size: 0.68rem; color: var(--muted); line-height: 1.7;
    border-top: 1px solid var(--border); padding-top: 20px;
  }
  .tip a { color: var(--gold-dim); text-decoration: none; }
  .tip a:hover { color: var(--gold); }

  .remember-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .remember-row input[type="checkbox"] { accent-color: var(--gold); }
  .remember-row label { font-size: 0.68rem; color: var(--muted); text-transform: none; letter-spacing: 0; margin: 0; cursor: pointer; }
</style>
</head>
<body>

<div class="panel">
  <div class="logo">My Life Story</div>
  <h1>Deploy to <span>GitHub</span></h1>

  <div class="field">
    <label>GitHub Token</label>
    <input type="password" id="tokenInput" placeholder="ghp_..." autocomplete="off">
    <div class="remember-row">
      <input type="checkbox" id="rememberToken" onchange="handleRemember()">
      <label for="rememberToken">Remember token in this browser</label>
    </div>
  </div>

  <div class="field">
    <label>Commit message</label>
    <input type="text" id="commitMsg" placeholder="e.g. v0.91 — spell check, factual story rules">
  </div>

  <div class="field">
    <label>index.html file</label>
    <div class="file-drop" id="dropZone">
      <input type="file" id="fileInput" accept=".html" onchange="handleFile(this)">
      <span class="drop-icon">📄</span>
      <div class="drop-text">Drop index.html here or click to browse</div>
      <div class="drop-name" id="fileName"></div>
    </div>
  </div>

  <button class="deploy-btn" id="deployBtn" onclick="deploy()" disabled>
    🚀 Deploy to GitHub
  </button>

  <div class="status-bar" id="statusBar">
    <div class="status-dot"></div>
    <span id="statusMsg"></span>
  </div>

  <div class="log" id="log"></div>

  <!-- Test results (shown after deploy) -->
  <div class="test-results" id="testResults">
    <div class="test-header" id="testHeader"></div>
    <div class="test-list" id="testList"></div>
    <button class="copy-failures-btn" id="copyFailuresBtn" onclick="copyFailures()">
      📋 Copy failures to clipboard — paste to Claude
    </button>
  </div>

  <div class="tip">
    Repo: <a href="https://github.com/g-urbach/life" target="_blank">g-urbach/life</a> →
    <a href="https://g-urbach.github.io/life/" target="_blank">g-urbach.github.io/life</a><br>
    Deploys first, then runs regression tests automatically. Your token never leaves this browser.
  </div>
</div>

<script>
  const REPO   = 'g-urbach/life';
  const FILE   = 'index.html';
  const BRANCH = 'main';

  let fileContent = null;
  let testFailures = [];

  // ── Token persistence ─────────────────────────────────────────────
  window.addEventListener('load', () => {
    const saved = localStorage.getItem('gh_token');
    if (saved) {
      document.getElementById('tokenInput').value = saved;
      document.getElementById('rememberToken').checked = true;
    }
    document.getElementById('tokenInput').addEventListener('input', checkReady);
  });

  function handleRemember() {
    const tok = document.getElementById('tokenInput').value.trim();
    if (document.getElementById('rememberToken').checked && tok) {
      localStorage.setItem('gh_token', tok);
    } else {
      localStorage.removeItem('gh_token');
    }
  }

  // ── File handling ─────────────────────────────────────────────────
  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) processFile(file);
  });

  function handleFile(input) { if (input.files[0]) processFile(input.files[0]); }

  function processFile(file) {
    document.getElementById('fileName').textContent = '✓ ' + file.name;
    const reader = new FileReader();
    reader.onload = e => {
      fileContent = e.target.result;
      const notesMatch = fileContent.match(/const DEPLOY_NOTES\s*=\s*["'`](.+?)["'`]/);
      if (notesMatch) {
        document.getElementById('commitMsg').value = notesMatch[1];
      } else {
        const verMatch = fileContent.match(/My Life Story (v[\d.]+)/);
        if (verMatch) document.getElementById('commitMsg').value = verMatch[1];
      }
      checkReady();
    };
    reader.readAsText(file);
  }

  function checkReady() {
    const hasToken = document.getElementById('tokenInput').value.trim().length > 10;
    const hasFile  = fileContent !== null;
    document.getElementById('deployBtn').disabled = !(hasToken && hasFile);
    if (document.getElementById('rememberToken').checked) {
      localStorage.setItem('gh_token', document.getElementById('tokenInput').value.trim());
    }
  }

  // ── Logging ───────────────────────────────────────────────────────
  function addLog(msg, type = 'info') {
    const log = document.getElementById('log');
    log.classList.add('visible');
    const line = document.createElement('div');
    line.className = 'log-line ' + type;
    const now = new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    line.innerHTML = `<span class="ts">${now}</span><span class="msg">${msg}</span>`;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  function setStatus(type, msg) {
    const bar = document.getElementById('statusBar');
    bar.className = 'status-bar visible ' + type;
    document.getElementById('statusMsg').textContent = msg;
  }

  // ── Deploy ────────────────────────────────────────────────────────
  async function deploy() {
    const token  = document.getElementById('tokenInput').value.trim();
    const commit = document.getElementById('commitMsg').value.trim() || 'Update index.html';
    const btn    = document.getElementById('deployBtn');
    if (!token || !fileContent) return;

    btn.disabled = true; btn.className = 'deploy-btn deploying'; btn.textContent = '⏳ Deploying...';
    document.getElementById('log').innerHTML = '';
    document.getElementById('statusBar').className = 'status-bar';
    document.getElementById('testResults').classList.remove('visible');

    addLog('Connecting to GitHub API...', 'info');

    try {
      addLog('Fetching current file SHA...', 'info');
      const getRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}?ref=${BRANCH}`, {
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
      });

      let sha = null;
      if (getRes.ok) {
        const getData = await getRes.json();
        sha = getData.sha;
        addLog(`Got file SHA: ${sha.substring(0, 8)}...`, 'info');
      } else if (getRes.status === 404) {
        addLog('File not found — creating new file', 'info');
      } else {
        throw new Error(`GitHub API error: ${getRes.status} ${await getRes.text()}`);
      }

      addLog('Encoding file...', 'info');
      const encoded = btoa(unescape(encodeURIComponent(fileContent)));

      addLog(`Pushing "${commit}"...`, 'info');
      const putBody = { message: commit, content: encoded, branch: BRANCH };
      if (sha) putBody.sha = sha;

      const putRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
        body: JSON.stringify(putBody)
      });

      if (!putRes.ok) {
        const err = await putRes.json();
        throw new Error(err.message || `Push failed: ${putRes.status}`);
      }

      const putData = await putRes.json();
      addLog('✓ Pushed successfully!', 'success');
      addLog(`Commit: ${putData.commit?.sha?.substring(0, 8) || 'done'}`, 'success');
      addLog('GitHub Pages deploying — running regression tests now...', 'info');

      setStatus('success', `✓ Deployed! Running tests...`);
      btn.textContent = '🚀 Deploy to GitHub'; btn.className = 'deploy-btn'; btn.disabled = false;

      // Run tests immediately on the file content (don't wait for Pages)
      addLog('Running regression tests on deployed file...', 'info');
      const results = runRegressionTests(fileContent);
      displayTestResults(results);

      // Also open live site after 30s
      setTimeout(() => window.open('https://g-urbach.github.io/life/', '_blank'), 30000);

    } catch(err) {
      addLog('✗ ' + err.message, 'error');
      setStatus('error', '✗ Deploy failed — check log above');
      btn.textContent = '🚀 Deploy to GitHub'; btn.className = 'deploy-btn'; btn.disabled = false;
    }
  }

  // ── Regression Tests ──────────────────────────────────────────────
  function runRegressionTests(html) {
    const results = [];
    const pass = (name, detail) => results.push({ status: 'pass', name, detail: detail || '' });
    const fail = (name, detail) => results.push({ status: 'fail', name, detail: detail || '' });
    const warn = (name, detail) => results.push({ status: 'warn', name, detail: detail || '' });

    // ── Version ──────────────────────────────────────────────────────
    const verMatch = html.match(/v([\d]+)\.([\d]+)<\/small>/);
    if (verMatch) {
      pass('Version number present', 'v' + verMatch[1] + '.' + verMatch[2]);
    } else {
      fail('Version number missing', 'Expected v0.XX</small> in header');
    }

    const deployNotes = html.match(/const DEPLOY_NOTES\s*=\s*["'](.+?)["']/);
    if (deployNotes) {
      pass('DEPLOY_NOTES present', deployNotes[1].substring(0, 60) + '...');
    } else {
      warn('DEPLOY_NOTES missing or malformed');
    }

    // ── Supabase config ──────────────────────────────────────────────
    const checks = [
      ['SUPABASE_URL',    /const SUPABASE_URL\s*=\s*['"]https:\/\/[^'"]+['"]/,    'Supabase URL configured'],
      ['SUPABASE_ANON',   /const SUPABASE_ANON\s*=\s*['"]eyJ[^'"]+['"]/,          'Supabase anon key configured'],
      ['AI_ENDPOINT',     /const AI_ENDPOINT/,                                     'AI endpoint configured'],
      ['PEECHO_PRODUCTS', /const PEECHO_PRODUCTS\s*=\s*\[/,                        'Peecho products configured'],
      ['PEECHO_PROXY_URL',/const PEECHO_PROXY_URL/,                               'Peecho proxy URL configured'],
    ];
    checks.forEach(([name, re, label]) => {
      re.test(html) ? pass(label) : fail(label, `Missing: ${name}`);
    });

    // ── Panels ───────────────────────────────────────────────────────
    const panels = [
      'panel-memories', 'panel-review', 'panel-story',
      'panel-help', 'panel-delete'
    ];
    panels.forEach(id => {
      html.includes(`id="${id}"`) ? pass(`Panel: #${id}`) : fail(`Panel missing: #${id}`, `id="${id}" not found`);
    });

    // ── Key HTML elements ────────────────────────────────────────────
    const elements = [
      ['memAnswer',           'Memories textarea'],
      ['memAIConvBtn',        'AI Conversation button'],
      ['memAITopicBtn',       'New Topic button'],
      ['memSaveBtn',          'Save button'],
      ['memSpellBtn',         'Fix Spelling button'],
      ['aiQuestionBox',       'AI question box'],
      ['chapterGrid',         'Chapter grid (Review)'],
      ['essentialsGrid',      'Essentials grid (Review)'],
      ['reviewEntryList',     'Review entry list'],
      ['promptsGrid',         'Memory prompts grid'],
      ['storyOutput',         'Story output area'],
      ['printBookPanel',      'Print book panel'],
      ['peechoProductGrid',   'Peecho product grid'],
      ['chapterDetail',       'Chapter detail panel'],
      ['newPasswordOverlay',  'Password reset overlay'],
      ['forgotPanel',         'Forgot password panel'],
    ];
    elements.forEach(([id, label]) => {
      html.includes(`id="${id}"`) ? pass(`Element: ${label}`) : fail(`Missing element: ${label}`, `id="${id}" not found`);
    });

    // ── Key functions ────────────────────────────────────────────────
    const functions = [
      ['memSave',              'memSave()'],
      ['memSaveAndNew',        'memSaveAndNew()'],
      ['memAIConversation',    'memAIConversation()'],
      ['memAINewTopic',        'memAINewTopic()'],
      ['memAskFollowUp',       'memAskFollowUp()'],
      ['spellCheckMemory',     'spellCheckMemory()'],
      ['acceptSpellFix',       'acceptSpellFix()'],
      ['generateStory',        'generateStory()'],
      ['renderStory',          'renderStory()'],
      ['renderReview',         'renderReview()'],
      ['renderEssentials',     'renderEssentials()'],
      ['mineEssentials',       'mineEssentials()'],
      ['renderPrompts',        'renderPrompts()'],
      ['usePrompt',            'usePrompt()'],
      ['openChapterDetail',    'openChapterDetail()'],
      ['closeChapterDetail',   'closeChapterDetail()'],
      ['improveEntry',         'improveEntry()'],
      ['acceptImprovement',    'acceptImprovement()'],
      ['applyTagSuggestions',  'applyTagSuggestions()'],
      ['saveEntryTags',        'saveEntryTags()'],
      ['toggleEditTags',       'toggleEditTags()'],
      ['deleteEntry',          'deleteEntry()'],
      ['sendPeechoTest',       'sendPeechoTest()'],
      ['showPrintBookPanel',   'showPrintBookPanel()'],
      ['renderPeechoProducts', 'renderPeechoProducts()'],
      ['exportPDF',            'exportPDF()'],
      ['showForgotPassword',   'showForgotPassword()'],
      ['sendPasswordReset',    'sendPasswordReset()'],
      ['submitNewPassword',    'submitNewPassword()'],
      ['showSetNewPassword',   'showSetNewPassword()'],
      ['addEntry',             'addEntry()'],
      ['loadEntries',          'loadEntries()'],
      ['getSignedUrl',         'getSignedUrl()'],
      ['callAI',               'callAI()'],
      ['toggleFunny',          'toggleFunny()'],
      ['buildEssentialsPage',  'buildEssentialsPage()'],
      ['highlightSearch',      'highlightSearch()'],
      ['clearReviewSearch',    'clearReviewSearch()'],
      ['scoreChapter',         'scoreChapter()'],
    ];
    functions.forEach(([name, label]) => {
      const re = new RegExp('function ' + name + '\\s*\\(');
      re.test(html) ? pass(`Function: ${label}`) : fail(`Missing function: ${label}`, `function ${name}() not found`);
    });

    // ── JS syntax checks ─────────────────────────────────────────────
    // Check for truncated strings — only flag short simple assignments, ignore long/complex lines
    const truncLines = html.split('\n').filter(line => {
      const t = line.trim();
      if (t.length > 200) return false;       // long lines are intentional (base64 etc)
      if (t.startsWith('//')) return false;   // comments
      if (t.includes('BARNABY')) return false; // known long base64 constant
      if (t.includes('onclick')) return false; // HTML attribute lines span naturally
      if (t.includes('innerHTML')) return false; // template content
      // Only flag: simple variable = 'string that never closes on this short line
      return /^(const|let|var)\s+\w+\s*=\s*['"][^'"]{1,120}$/.test(t);
    });
    if (truncLines.length === 0) {
      pass('No truncated string assignments detected');
    } else {
      truncLines.slice(0,3).forEach(l => fail('Possibly truncated string', l.trim().substring(0, 80)));
    }

    // Check for escaped backticks \` which break JS (common Python-generation bug)
    const escapedBackticks = (html.match(/\\`/g) || []).length;
    if (escapedBackticks === 0) {
      pass('No escaped backticks (\\`) detected');
    } else {
      fail(`${escapedBackticks} escaped backtick(s) found`, 'Search for \\\\` in JS — will cause SyntaxError');
    }

    // Check script tags are balanced
    const openScript  = (html.match(/<script/g)  || []).length;
    const closeScript = (html.match(/<\/script>/g) || []).length;
    if (openScript === closeScript) {
      pass(`Script tags balanced (${openScript} open, ${closeScript} close)`);
    } else {
      fail('Script tags unbalanced', `${openScript} &lt;script&gt; vs ${closeScript} &lt;/script&gt;`);
    }

    // Check for common broken patterns we've actually hit
    const brokenPatterns = [
      { re: /innerHTML\s*=\s*[^;'"]*$(?!m)/m,         msg: 'Possible unclosed innerHTML assignment' },
      { re: /const BARNABY_PDF_B64\s*=\s*'[A-Za-z0-9+/=]{10,}';/, msg: 'BARNABY_PDF_B64 looks truncated' },
    ];
    // Only check the BARNABY one
    if (/const BARNABY_PDF_B64\s*=\s*'[A-Za-z0-9+/=]{50,}';/.test(html)) {
      pass('BARNABY_PDF_B64 present and non-empty');
    } else {
      warn('BARNABY_PDF_B64 missing or very short');
    }

    // ── Nav tabs ─────────────────────────────────────────────────────
    const navTabs = [
      ["showPanel('memories'",  'Memories tab'],
      ["showPanel('review'",    'Review tab'],
      ["showPanel('story'",     'My Story tab'],
      ["showPanel('help'",      'Help tab'],
      ["showPanel('delete'",    'Delete tab'],
    ];
    navTabs.forEach(([text, label]) => {
      html.includes(text) ? pass(`Nav: ${label}`) : fail(`Nav missing: ${label}`, `showPanel call not found`);
    });

    // ── JS syntax check (via Function constructor) ───────────────────
    const scriptMatch = html.match(/<script>([\s\S]*?)<\/script>/);
    if (scriptMatch) {
      const jsCode = scriptMatch[1];
      try {
        new Function(jsCode);
        pass('JS syntax valid (no parse errors)');
      } catch(e) {
        // Find approximate line number
        const lineHint = e.message.match(/line (\d+)/) ? ' near line ' + e.message.match(/line (\d+)/)[1] : '';
        fail('JS syntax error' + lineHint, e.message.substring(0, 120));
      }
    } else {
      warn('Could not find script block to syntax check');
    }

    // ── AI resilience ────────────────────────────────────────────────
    (html.includes('parseAttempts') || html.includes('for (const attempt of'))
      ? pass('AI JSON parsing has multiple fallback attempts')
      : warn('AI JSON parsing may be fragile — should have multiple parse attempts');

    // ── Story modes ──────────────────────────────────────────────────
    const storyModes = ['blurb', 'short', 'extended', 'chapters'];
    storyModes.forEach(mode => {
      html.includes(`generateStory('${mode}')`) ?
        pass(`Story mode: ${mode}`) :
        fail(`Story mode missing: ${mode}`, `generateStory('${mode}') not found`);
    });

    // ── Summary ──────────────────────────────────────────────────────
    const passed  = results.filter(r => r.status === 'pass').length;
    const failed  = results.filter(r => r.status === 'fail').length;
    const warned  = results.filter(r => r.status === 'warn').length;
    results.summary = { passed, failed, warned, total: results.length };

    return results;
  }

  // ── Display test results ──────────────────────────────────────────
  function displayTestResults(results) {
    const { passed, failed, warned, total } = results.summary;
    testFailures = results.filter(r => r.status === 'fail');

    const container = document.getElementById('testResults');
    const header    = document.getElementById('testHeader');
    const list      = document.getElementById('testList');
    const copyBtn   = document.getElementById('copyFailuresBtn');

    container.classList.add('visible');

    if (failed > 0) {
      header.className = 'test-header has-fail';
      header.innerHTML = `<span>❌ ${failed} FAILED · ${warned} warnings · ${passed} passed</span><span>${total} tests</span>`;
      setStatus('error', `✓ Deployed but ${failed} test${failed>1?'s':''} failed — see results below`);
      copyBtn.classList.add('visible');
    } else if (warned > 0) {
      header.className = 'test-header has-warn';
      header.innerHTML = `<span>⚠️ ${warned} warnings · ${passed} passed</span><span>${total} tests</span>`;
      setStatus('warn', `✓ Deployed · ${warned} warning${warned>1?'s':''} · check results below`);
    } else {
      header.className = 'test-header all-pass';
      header.innerHTML = `<span>✅ All ${passed} tests passed</span><span>${total} tests</span>`;
      setStatus('success', `✓ Deployed · all ${total} regression tests passed!`);
    }

    // Show failures and warnings first, then passes
    const sorted = [
      ...results.filter(r => r.status === 'fail'),
      ...results.filter(r => r.status === 'warn'),
      ...results.filter(r => r.status === 'pass'),
    ];

    list.innerHTML = sorted.map(r => {
      const icon = r.status === 'pass' ? '✓' : r.status === 'warn' ? '⚠' : '✗';
      return `<div class="test-item ${r.status}">
        <span class="test-icon">${icon}</span>
        <div>
          <div class="test-name">${r.name}</div>
          ${r.detail ? `<div class="test-detail">${r.detail}</div>` : ''}
        </div>
      </div>`;
    }).join('');

    // Log summary
    if (failed > 0) {
      addLog(`Tests: ${failed} FAILED, ${warned} warnings, ${passed} passed`, 'error');
    } else {
      addLog(`Tests: all ${passed} passed${warned ? ', ' + warned + ' warnings' : ''}`, 'success');
    }
  }

  // ── Copy failures for Claude ──────────────────────────────────────
  function copyFailures() {
    const lines = ['REGRESSION TEST FAILURES — ' + new Date().toLocaleString('en-AU')];
    const ver   = fileContent?.match(/v([\d]+\.[\d]+)<\/small>/);
    if (ver) lines.push('Version: v' + ver[1]);
    lines.push('');
    testFailures.forEach(f => {
      lines.push('❌ ' + f.name);
      if (f.detail) lines.push('   Detail: ' + f.detail);
    });
    const warns = document.getElementById('testList').querySelectorAll('.test-item.warn');
    if (warns.length) {
      lines.push('');
      lines.push('WARNINGS:');
      warns.forEach(w => lines.push('⚠️ ' + w.querySelector('.test-name').textContent));
    }
    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      document.getElementById('copyFailuresBtn').textContent = '✓ Copied! Paste to Claude';
      setTimeout(() => {
        document.getElementById('copyFailuresBtn').textContent = '📋 Copy failures to clipboard — paste to Claude';
      }, 2000);
    });
  }
</script>
